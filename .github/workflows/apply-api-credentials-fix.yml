name: Apply API credentials fix

on:
  push:
    branches:
      - agent/send-api-credentials

permissions:
  contents: write

jobs:
  patch-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/send-api-credentials

      - name: Patch credentialed API requests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          script_path = Path("script.js")
          text = script_path.read_text(encoding="utf-8")

          old = '''  const response = await fetch(`${BACKEND_URL}${path}`, {
            headers: { "Content-Type": "application/json", ...(options.headers || {}) },
            ...options
          });'''

          new = '''  const response = await fetch(`${BACKEND_URL}${path}`, {
            credentials: "include",
            headers: {
              "Content-Type": "application/json",
              ...(options.headers || {})
            },
            ...options
          });'''

          if old not in text:
              raise SystemExit("Expected apiFetchJson snippet was not found; refusing to alter script.js")

          script_path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/apply-api-credentials-fix.yml").unlink()
          PY

      - name: Validate JavaScript syntax
        run: node --check script.js

      - name: Commit patched file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Send credentials with dashboard API requests"
          git push origin HEAD:agent/send-api-credentials
