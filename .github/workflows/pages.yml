name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit production data paths
        run: node scripts/audit-production-data.mjs

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html style.css script.js _site/
          cp ui-polish.js dashboard-runtime-fixes.js ai-assistant.js ai-assistant-core.js _site/
          cat performance-data.js resilient-data.js portfolio-intelligence.js ai-assistant.js minute-refresh.js >> _site/script.js
          cp index.html _site/404.html
          sed -i 's/script.js?v=11.1/script.js?v=12.2/g' _site/index.html _site/404.html
          sed -i 's/ai-assistant.js?v=1.0/ai-assistant.js?v=2.3/g' _site/index.html _site/404.html
          python - <<'PY'
          from pathlib import Path

          tag = '  <script src="ui-polish.js?v=2.1"></script>\n'
          for name in ("index.html", "404.html"):
              path = Path("_site") / name
              html = path.read_text()
              if "ui-polish.js" not in html:
                  html = html.replace("</body>", f"{tag}</body>")
              path.write_text(html)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4