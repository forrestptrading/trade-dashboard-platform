name: Validate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: |
          set -o pipefail
          {
            pnpm run typecheck:libs
            pnpm --filter @workspace/api-server typecheck
          } 2>&1 | tee /tmp/typecheck.log

      - name: Check production JavaScript
        if: always()
        run: |
          set -o pipefail
          node --check script.js 2>&1 | tee /tmp/javascript-check.log
          node --check scripts/audit-production-data.mjs 2>&1 | tee -a /tmp/javascript-check.log
          node -e 'const fs=require("fs"); const html=fs.readFileSync("index.html","utf8"); const blocks=[...html.matchAll(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/gi)]; for (const [,source] of blocks) new Function(source); console.log(`Validated ${blocks.length} inline script block(s).`);' 2>&1 | tee -a /tmp/javascript-check.log

      - name: Audit every repository file
        if: always()
        run: |
          set -o pipefail
          node scripts/audit-production-data.mjs 2>&1 | tee /tmp/production-audit.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            /tmp/typecheck.log
            /tmp/javascript-check.log
            /tmp/production-audit.log
          if-no-files-found: ignore
