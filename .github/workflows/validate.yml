name: Validate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: |
          set -o pipefail
          {
            pnpm run typecheck:libs
            pnpm --filter @workspace/api-server typecheck
          } 2>&1 | tee /tmp/typecheck.log

      - name: Check deployed dashboard JavaScript
        if: always()
        run: |
          cat script.js api-credentials-patch.js snaptrade-frontend-patch.js snaptrade-session-patch.js no-mock-portfolio-patch.js > /tmp/dashboard.js
          node --check /tmp/dashboard.js 2>&1 | tee /tmp/javascript-check.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            /tmp/typecheck.log
            /tmp/javascript-check.log
          if-no-files-found: ignore
